      --panel: rgba(32, 70, 148, 0.45);

    }

    h1 {

      font-family: "Rubik Mono One", monospace;

      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--accent);

      max-width: 48ch;
      color: var(--muted);
      font-size: clamp(1rem, 2.6vw, 1.15rem);
      line-height: 1.6;
    }

      align-items: center;
      justify-content: center;
      min-height: 54px;
      min-width: 240px;
      padding: 0 26px;
      border-radius: 12px;
      border: 0;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #203b7d;
      font-weight: 700;
      font-size: 1.05rem;
      font-family: "Plus Jakarta Sans", sans-serif;
    }

    .apk-note {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #eef4ff;
    }

    @media (max-width: 640px) {
